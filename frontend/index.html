<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogue Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Catalogue Generator</h1>
      <p class="sub">Turn a product PDF into a clean grid catalogue.</p>
    </header>

    <form id="form" class="card">
      <label class="drop" id="drop">
        <input type="file" id="file" accept="application/pdf" hidden />
        <div class="drop-inner">
          <strong id="drop-title">Drop catalogue PDF here</strong>
          <span id="drop-sub">or click to choose a file</span>
        </div>
      </label>

      <label class="drop drop-secondary" id="drop-price">
        <input type="file" id="price-file" accept=".xlsx,.xls" hidden />
        <div class="drop-inner">
          <strong id="drop-price-title">Drop dealer price list (optional)</strong>
          <span id="drop-price-sub">.xlsx — adds DP. ₹X under each MRP and lists missing models</span>
        </div>
      </label>

      <div class="grid">
        <label>
          <span>Columns</span>
          <input type="number" id="cols" value="4" min="1" max="10" />
          <small class="hint">Products per row in the output grid.</small>
        </label>
        <label>
          <span>Rows / page</span>
          <input type="number" id="rows_per_page" value="6" min="1" max="20" />
          <small class="hint">Grid rows on each output page. More rows = fewer, taller pages.</small>
        </label>
        <label>
          <span>Render scale</span>
          <input type="number" id="scale" value="5" min="1" max="6" />
          <small class="hint">Resolution multiplier (1-6). Higher = sharper but larger. Values above 6 are capped server-side to avoid out-of-memory crashes.</small>
        </label>
        <label>
          <span>Skip pages</span>
          <input type="number" id="skip_pages" value="1" min="0" max="50" />
          <small class="hint">Pages to skip from the start of the source PDF (e.g. cover/intro). Set 0 if products begin on page 1.</small>
        </label>
        <label>
          <span>Divider px</span>
          <input type="number" id="divider" value="3" min="0" max="20" />
          <small class="hint">Thickness of grey lines between cells. Set 0 for a borderless grid.</small>
        </label>
        <label>
          <span>Match threshold</span>
          <input type="number" id="match_threshold" value="100" min="50" max="100" />
          <small class="hint">Fuzzy match strictness (50-100). 100 = only exact (after normalization). Lower for more matches with some risk of mismatch.</small>
        </label>
      </div>

      <button type="submit" id="submit" disabled>Generate catalogue</button>

      <div id="status" class="status hidden"></div>
    </form>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
